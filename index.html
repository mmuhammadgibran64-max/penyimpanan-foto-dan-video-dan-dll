<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presensi Masuk Layanan</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .glass-effect {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="bg-gradient-to-tr from-slate-100 via-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Card Utama -->
    <div class="glass-effect rounded-3xl shadow-2xl border border-white/40 overflow-hidden transition-all duration-300">
      
      <!-- Bagian Header Visual -->
      <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-8 text-white relative overflow-hidden">
        <!-- Dekorasi Latar Belakang -->
        <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full blur-xl"></div>
        <div class="absolute -left-10 -top-10 w-32 h-32 bg-indigo-500/20 rounded-full blur-lg"></div>
        
        <div class="relative z-10 flex flex-col items-center text-center">
          <div class="w-16 h-16 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center mb-4 shadow-inner">
            <i class="fa-solid fa-right-to-bracket text-3xl"></i>
          </div>
          <h1 class="text-2xl font-bold tracking-tight">Presensi Masuk</h1>
          <p class="text-blue-100 text-sm mt-1">Silakan isi data diri Anda untuk mencatat jam masuk</p>
        </div>
      </div>

      <!-- Bagian Form -->
      <div class="p-8">
        
        <!-- Notifikasi Pesan (Sembunyi secara default) -->
        <div id="notification-box" class="hidden mb-6 p-4 rounded-2xl flex items-start gap-3 transform translate-y-0 transition-all duration-300">
          <div id="notification-icon" class="text-xl mt-0.5"></div>
          <div class="flex-1">
            <h4 id="notification-title" class="font-semibold text-sm"></h4>
            <p id="notification-desc" class="text-xs mt-1"></p>
          </div>
          <button onclick="hideNotification()" class="text-gray-400 hover:text-gray-600 focus:outline-none">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <form id="attendance-form" class="space-y-5" onsubmit="handleSubmit(event)">
          
          <!-- Input Nama -->
          <div>
            <label for="nama" class="block text-sm font-semibold text-slate-700 mb-2">Nama Lengkap</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                <i class="fa-regular fa-user"></i>
              </span>
              <input 
                type="text" 
                id="nama" 
                name="nama" 
                required
                placeholder="Masukkan nama lengkap Anda" 
                class="w-full pl-11 pr-4 py-3 bg-white/60 border border-slate-200 rounded-2xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
              />
            </div>
          </div>

          <!-- Input Nomor HP -->
          <div>
            <label for="no_hp" class="block text-sm font-semibold text-slate-700 mb-2">Nomor HP</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                <i class="fa-solid fa-phone"></i>
              </span>
              <input 
                type="tel" 
                id="no_hp" 
                name="no_hp" 
                required
                placeholder="Contoh: 081234567890" 
                class="w-full pl-11 pr-4 py-3 bg-white/60 border border-slate-200 rounded-2xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
              />
            </div>
          </div>

          <!-- Input Jam Masuk -->
          <div>
            <label for="jam_masuk" class="block text-sm font-semibold text-slate-700 mb-2">Jam Masuk</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                <i class="fa-regular fa-clock"></i>
              </span>
              <input 
                type="time" 
                id="jam_masuk" 
                name="jam_masuk" 
                required
                class="w-full pl-11 pr-4 py-3 bg-white/60 border border-slate-200 rounded-2xl text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
              />
              <button 
                type="button" 
                onclick="setCurrentTime()" 
                title="Gunakan waktu sekarang"
                class="absolute inset-y-0 right-0 flex items-center pr-4 text-blue-500 hover:text-blue-700 transition-colors"
              >
                <i class="fa-solid fa-rotate-left"></i>
              </button>
            </div>
            <p class="text-[11px] text-slate-500 mt-1.5 pl-1">
              <i class="fa-solid fa-circle-info mr-1 text-blue-400"></i> Jam otomatis terisi dengan waktu saat ini.
            </p>
          </div>

          <!-- Tombol Kirim / Submit -->
          <button 
            type="submit" 
            id="btn-submit"
            class="w-full mt-2 py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-semibold rounded-2xl shadow-lg shadow-blue-500/20 active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-2"
          >
            <span id="btn-text">Simpan & Masuk</span>
            <span id="btn-spinner" class="hidden">
              <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
            </span>
          </button>

        </form>

      </div>
    </div>
    
    <!-- Footer / Watermark -->
    <p class="text-center text-slate-400 text-xs mt-6">
      Sistem Presensi Mandiri &bull; Data disimpan secara aman
    </p>
  </div>

  <script>
    // URL Google Apps Script yang diberikan
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwBBOIqohufCfCsC9fO7RDHa_XNk3DzBGLEp6iAqvRZuaE7z8KUqhvl4Vk_budYESpk/exec";

    // Set waktu default saat halaman dimuat
    document.addEventListener("DOMContentLoaded", () => {
      setCurrentTime();
    });

    // Fungsi untuk mengisi jam masuk secara otomatis berdasarkan waktu lokal pengguna
    function setCurrentTime() {
      const timeInput = document.getElementById("jam_masuk");
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      timeInput.value = `${hours}:${minutes}`;
    }

    // Fungsi menyembunyikan kotak notifikasi
    function hideNotification() {
      const box = document.getElementById("notification-box");
      box.classList.add("hidden");
    }

    // Fungsi menampilkan notifikasi kustom
    function showNotification(type, title, message) {
      const box = document.getElementById("notification-box");
      const icon = document.getElementById("notification-icon");
      const tTitle = document.getElementById("notification-title");
      const tDesc = document.getElementById("notification-desc");

      // Reset style
      box.className = "mb-6 p-4 rounded-2xl flex items-start gap-3 transform translate-y-0 transition-all duration-300";

      if (type === "success") {
        box.classList.add("bg-emerald-50", "text-emerald-800", "border", "border-emerald-200");
        icon.innerHTML = '<i class="fa-solid fa-circle-check text-emerald-500"></i>';
      } else if (type === "error") {
        box.classList.add("bg-rose-50", "text-rose-800", "border", "border-rose-200");
        icon.innerHTML = '<i class="fa-solid fa-circle-exclamation text-rose-500"></i>';
      } else {
        box.classList.add("bg-blue-50", "text-blue-800", "border", "border-blue-200");
        icon.innerHTML = '<i class="fa-solid fa-circle-info text-blue-500"></i>';
      }

      tTitle.innerText = title;
      tDesc.innerText = message;
      box.classList.remove("hidden");
      
      // Auto scroll ke posisi notifikasi agar terlihat di layar kecil
      box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Penanganan saat tombol kirim ditekan
    async function handleSubmit(event) {
      event.preventDefault();

      const form = document.getElementById("attendance-form");
      const btnSubmit = document.getElementById("btn-submit");
      const btnText = document.getElementById("btn-text");
      const btnSpinner = document.getElementById("btn-spinner");

      const nama = document.getElementById("nama").value.trim();
      const no_hp = document.getElementById("no_hp").value.trim();
      const jam_masuk = document.getElementById("jam_masuk").value;

      // Animasi Loading
      btnSubmit.disabled = true;
      btnSubmit.classList.add("opacity-80", "cursor-not-allowed");
      btnText.innerText = "Mengirim data...";
      btnSpinner.classList.remove("hidden");
      hideNotification();

      // Struktur Data yang dikirim (Format URLSearchParams agar mudah ditangkap Google Sheets POST standard)
      const dataToSend = new URLSearchParams();
      dataToSend.append("nama", nama);
      dataToSend.append("no_hp", no_hp);
      dataToSend.append("jam_masuk", jam_masuk);

      // Implementasi Retry dengan Exponential Backoff (Maksimum 5 kali percobaan)
      let retries = 5;
      let delay = 1000; // Mulai dari 1 detik
      let success = false;

      for (let i = 0; i < retries; i++) {
        try {
          // Mengirimkan data via POST ke Google Apps Script
          const response = await fetch(scriptUrl, {
            method: "POST",
            mode: "no-cors", // Mode 'no-cors' sering dibutuhkan untuk Google Apps Script agar terhindar dari pemblokiran CORS browser lokal
            headers: {
              "Content-Type": "application/x-www-form-urlencoded"
            },
            body: dataToSend
          });

          // Mengingat mode 'no-cors' tidak mengembalikan respons yang bisa dibaca (opaque response),
          // jika fetch tidak melempar error, kita asumsikan pengiriman berhasil diterima oleh server Google.
          success = true;
          break; // Keluar dari loop jika berhasil

        } catch (error) {
          if (i === retries - 1) {
            console.error("Gagal mengirim setelah beberapa kali mencoba:", error);
          } else {
            // Tunggu sesuai delay sebelum mencoba kembali (exponential backoff)
            await new Promise(resolve => setTimeout(resolve, delay));
            delay *= 2; // gandakan waktu tunggu
          }
        }
      }

      // Selesai Loading
      btnSubmit.disabled = false;
      btnSubmit.classList.remove("opacity-80", "cursor-not-allowed");
      btnText.innerText = "Simpan & Masuk";
      btnSpinner.classList.add("hidden");

      if (success) {
        showNotification(
          "success", 
          "Berhasil Terkirim!", 
          `Terima kasih, ${nama}. Data presensi jam ${jam_masuk} Anda telah berhasil dicatat ke sistem penyimpanan.`
        );
        // Reset form input setelah sukses (kecuali jam yang akan diupdate ke waktu terbaru)
        document.getElementById("nama").value = "";
        document.getElementById("no_hp").value = "";
        setCurrentTime();
      } else {
        showNotification(
          "error", 
          "Koneksi Gagal", 
          "Terjadi masalah koneksi atau server saat mengirimkan data. Silakan coba kembali dalam beberapa saat."
        );
      }
    }
  </script>
</body>
</html>
