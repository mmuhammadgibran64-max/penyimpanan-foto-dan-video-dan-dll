<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlimited Drive - Premium Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #eef2ff, #f8fafc);
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Dashboard Utama</h1>
                <p class="text-slate-500 font-medium">Sistem penyimpanan awan tak terbatas.</p>
            </div>
            <div class="flex gap-3">
                <button onclick="createFolder()" class="glass hover:bg-white text-slate-700 px-5 py-3 rounded-2xl font-bold shadow-sm flex items-center gap-2 transition-all">
                    <i data-lucide="folder-plus"></i> Baru
                </button>
                <button onclick="uploadFile()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-200 flex items-center gap-2 transition-all hover:scale-105 active:scale-95">
                    <i data-lucide="upload"></i> Unggah
                </button>
            </div>
        </header>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
            <!-- Sidebar -->
            <aside class="md:col-span-3 space-y-4">
                <div class="glass p-6 rounded-3xl shadow-sm">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Kategori</h2>
                    <nav class="space-y-1">
                        <a href="#" class="flex items-center gap-3 p-3 rounded-xl hover:bg-indigo-50 text-slate-600 hover:text-indigo-600 transition-colors">
                            <i data-lucide="image" class="w-5 h-5"></i> Foto
                        </a>
                        <a href="#" class="flex items-center gap-3 p-3 rounded-xl hover:bg-indigo-50 text-slate-600 hover:text-indigo-600 transition-colors">
                            <i data-lucide="video" class="w-5 h-5"></i> Video
                        </a>
                        <a href="#" class="flex items-center gap-3 p-3 rounded-xl hover:bg-indigo-50 text-slate-600 hover:text-indigo-600 transition-colors">
                            <i data-lucide="music" class="w-5 h-5"></i> Musik
                        </a>
                        <a href="#" class="flex items-center gap-3 p-3 rounded-xl hover:bg-indigo-50 text-slate-600 hover:text-indigo-600 transition-colors">
                            <i data-lucide="file-text" class="w-5 h-5"></i> Dokumen
                        </a>
                    </nav>
                </div>
            </aside>

            <!-- Content -->
            <main class="md:col-span-9 glass p-8 rounded-3xl shadow-sm min-h-[500px]">
                <h2 class="text-xl font-bold text-slate-900 mb-8">Penyimpanan Anda</h2>
                
                <div id="file-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                    <!-- Placeholder Item -->
                    <div class="bg-white/50 border border-white p-4 rounded-2xl flex flex-col items-center justify-center h-32 hover:border-indigo-200 transition-all cursor-pointer">
                        <i data-lucide="folder" class="w-8 h-8 text-indigo-400 mb-2"></i>
                        <span class="text-sm font-semibold text-slate-600">Folder Saya</span>
                    </div>
                    <div class="bg-white/50 border border-white p-4 rounded-2xl flex flex-col items-center justify-center h-32 hover:border-indigo-200 transition-all cursor-pointer">
                        <i data-lucide="file" class="w-8 h-8 text-slate-400 mb-2"></i>
                        <span class="text-sm font-semibold text-slate-600">File_1.jpg</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Inisialisasi Icons
        lucide.createIcons();
        
        const API_URL = "https://script.google.com/macros/s/AKfycbxQReSNL6X04I4ofX3BGg9aBk2lYfEpZmk7JPUm8ys_U2113KcCU1DTMyn6d_zE8t6a/exec";

        function createFolder() {
            const name = prompt("Nama folder baru:");
            if(name) { /* Logic API Create */ }
        }

        function uploadFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = (e) => {
                const file = e.target.files[0];
                alert("Mengunggah: " + file.name);
                // Logic API Upload
            };
            input.click();
        }
    </script>
</body>
</html>
